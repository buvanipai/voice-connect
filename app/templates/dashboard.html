<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceConnect Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .slide-over { transform: translateX(100%); transition: transform 0.3s ease; }
    .slide-over.open { transform: translateX(0); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold text-gray-900">VoiceConnect Dashboard</h1>
      <button onclick="refreshAll()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">↻ Refresh</button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 mt-6">

    <!-- Tabs -->
    <div class="border-b border-gray-200 mb-6">
      <nav class="flex gap-8">
        <button onclick="switchTab('callers')" id="tab-callers"
          class="pb-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600">
          Callers
        </button>
        <button onclick="switchTab('notifications')" id="tab-notifications"
          class="pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          Failed Notifications
        </button>
      </nav>
    </div>

    <!-- Callers Panel -->
    <div id="panel-callers">
      <!-- Intent filter chips -->
      <div class="flex gap-2 mb-4 flex-wrap">
        <button onclick="filterIntent(null)" id="filter-all"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-900 text-white">All</button>
        <button onclick="filterIntent('JOB_SEEKER')" id="filter-JOB_SEEKER"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">Job Seeker</button>
        <button onclick="filterIntent('US_STAFFING')" id="filter-US_STAFFING"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">US Staffing</button>
        <button onclick="filterIntent('AI_PROD_DEV')" id="filter-AI_PROD_DEV"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">AI Product Dev</button>
        <button onclick="filterIntent('AI_CAREER_DEV')" id="filter-AI_CAREER_DEV"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">AI Career Dev</button>
        <button onclick="filterIntent('GENERAL_INQUIRY')" id="filter-GENERAL_INQUIRY"
          class="filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">General Inquiry</button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Intent</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">All Intents</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Interaction</th>
            </tr>
          </thead>
          <tbody id="callers-tbody" class="bg-white divide-y divide-gray-200">
            <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Failed Notifications Panel -->
    <div id="panel-notifications" class="hidden">
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Channel</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reason</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
            </tr>
          </thead>
          <tbody id="notifications-tbody" class="bg-white divide-y divide-gray-200">
            <tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Overlay -->
  <div id="overlay" onclick="closeDetail()"
    class="hidden fixed inset-0 bg-black bg-opacity-30 z-40"></div>

  <!-- Caller Detail Slide-Over -->
  <div id="detail-panel"
    class="slide-over fixed top-0 right-0 h-full w-full max-w-2xl bg-white shadow-xl z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 id="detail-title" class="text-lg font-semibold text-gray-900"></h2>
        <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
    const INTENT_COLORS = {
      JOB_SEEKER:      'bg-blue-100 text-blue-800',
      US_STAFFING:     'bg-green-100 text-green-800',
      AI_PROD_DEV:     'bg-purple-100 text-purple-800',
      AI_CAREER_DEV:   'bg-orange-100 text-orange-800',
      GENERAL_INQUIRY: 'bg-gray-100 text-gray-700',
    };

    const INTENT_LABELS = {
      JOB_SEEKER:      'Job Seeker',
      US_STAFFING:     'US Staffing',
      AI_PROD_DEV:     'AI Product Dev',
      AI_CAREER_DEV:   'AI Career Dev',
      GENERAL_INQUIRY: 'General Inquiry',
    };

    const SKIP_KEYS = new Set(['branch', 'caller_country', 'caller_state', 'conversation_id', 'call_sid']);

    let currentFilter = null;

    function badge(intent) {
      const cls = INTENT_COLORS[intent] || 'bg-gray-100 text-gray-700';
      const label = INTENT_LABELS[intent] || intent;
      return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${cls}">${label}</span>`;
    }

    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString();
    }

    async function loadCallers() {
      const url = currentFilter ? `/api/callers?intent=${currentFilter}` : '/api/callers';
      const callers = await fetch(url).then(r => r.json());
      const tbody = document.getElementById('callers-tbody');
      if (!callers.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No callers found.</td></tr>';
        return;
      }
      tbody.innerHTML = callers.map(c => `
        <tr onclick="openDetail('${c.phone_number}')"
          class="hover:bg-gray-50 cursor-pointer transition-colors">
          <td class="px-6 py-4 text-sm font-medium text-gray-900">${c.name || '—'}</td>
          <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">${c.phone_number}</td>
          <td class="px-6 py-4">${c.last_intent ? badge(c.last_intent) : '—'}</td>
          <td class="px-6 py-4 flex flex-wrap gap-1">${c.intents.map(badge).join('')}</td>
          <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">${fmt(c.last_interaction)}</td>
        </tr>
      `).join('');
    }

    async function loadNotifications() {
      const notifications = await fetch('/api/failed-notifications').then(r => r.json());
      const tbody = document.getElementById('notifications-tbody');
      if (!notifications.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">No failed notifications.</td></tr>';
        return;
      }
      tbody.innerHTML = notifications.map(n => `
        <tr>
          <td class="px-6 py-4 text-sm text-gray-900 whitespace-nowrap">${n.caller_number || '—'}</td>
          <td class="px-6 py-4 text-sm">${n.preferred_method ? badge(n.preferred_method.toUpperCase()) : '—'}</td>
          <td class="px-6 py-4 text-sm text-red-600 max-w-xs">${n.reason || '—'}</td>
          <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">${fmt(n.timestamp)}</td>
        </tr>
      `).join('');
    }

    async function openDetail(phone) {
      const data = await fetch(`/api/callers/${encodeURIComponent(phone)}`).then(r => r.json());
      document.getElementById('detail-title').textContent = data.name || phone;

      const intents = data.intents || {};
      let html = `
        <div class="mb-6 space-y-1 text-sm text-gray-600">
          <div><span class="font-medium text-gray-700">Phone:</span> ${phone}</div>
          <div><span class="font-medium text-gray-700">First call:</span> ${fmt(data.created_at)}</div>
          <div><span class="font-medium text-gray-700">Last interaction:</span> ${fmt(data.last_interaction)}</div>
        </div>
      `;

      for (const [intent, intentData] of Object.entries(intents)) {
        if (typeof intentData !== 'object') continue;
        html += `
          <div class="mb-5 border rounded-lg overflow-hidden">
            <div class="px-4 py-2 bg-gray-50 border-b">${badge(intent)}</div>
            <div class="px-4 py-3 space-y-2">
        `;
        for (const [key, value] of Object.entries(intentData)) {
          if (SKIP_KEYS.has(key) || !value) continue;
          if (key === 'transcript_summary') {
            html += `
              <div class="text-sm">
                <div class="font-medium text-gray-700 mb-1">Transcript Summary</div>
                <div class="text-gray-600 text-xs leading-relaxed bg-gray-50 p-3 rounded">${value}</div>
              </div>
            `;
          } else {
            html += `
              <div class="text-sm flex gap-2">
                <span class="font-medium text-gray-700 capitalize min-w-32 shrink-0">${key.replace(/_/g, ' ')}:</span>
                <span class="text-gray-600">${value}</span>
              </div>
            `;
          }
        }
        html += `</div></div>`;
      }

      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('detail-panel').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('detail-panel').classList.remove('open');
    }

    function switchTab(tab) {
      document.getElementById('panel-callers').classList.toggle('hidden', tab !== 'callers');
      document.getElementById('panel-notifications').classList.toggle('hidden', tab !== 'notifications');
      ['callers', 'notifications'].forEach(t => {
        document.getElementById(`tab-${t}`).className = t === tab
          ? 'pb-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600'
          : 'pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
      });
      if (tab === 'notifications') loadNotifications();
    }

    function filterIntent(intent) {
      currentFilter = intent;
      document.querySelectorAll('.filter-chip').forEach(btn => {
        btn.className = 'filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 hover:bg-gray-200';
      });
      const activeId = intent ? `filter-${intent}` : 'filter-all';
      document.getElementById(activeId).className = 'filter-chip px-3 py-1 rounded-full text-xs font-medium bg-gray-900 text-white';
      loadCallers();
    }

    function refreshAll() {
      loadCallers();
      if (!document.getElementById('panel-notifications').classList.contains('hidden')) {
        loadNotifications();
      }
    }

    loadCallers();
    setInterval(refreshAll, 30000);
  </script>
</body>
</html>
